name: 下载OK影视直播源

on:
  schedule:
    # 每天北京时间上午8点自动运行
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  download-and-save:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # 防止任务超时
    
    steps:
      - name: 签出仓库代码
        uses: actions/checkout@v4

      - name: 安装依赖工具
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl wget
          
      - name: 下载并解析主播放列表
        run: |
          MAIN_URL="https://js.iptvlive.icu/iptv168"
          
          # 添加重试机制和User-Agent模拟
          echo "正在获取主播放列表..."
          MAIN_JSON=$(curl -s -L --retry 3 --retry-delay 2 \
            -H "User-Agent: okHttp/3.12.1" \
            -H "Accept: application/json" \
            "$MAIN_URL" 2>&1)
          
          # 检查是否成功获取数据
          if [ -z "$MAIN_JSON" ]; then
            echo "错误：无法获取主播放列表数据"
            exit 1
          fi
          
          echo "$MAIN_JSON" | head -c 500  # 显示前500字符用于调试
          
          # 使用Python解码Base64（更可靠）
          python3 << 'EOF'
          import json
          import base64
          import sys
          
          try:
              # 读取主JSON数据
              with open('main_data.b64', 'w') as f:
                  pass  # 清空文件
              
              # 从环境变量或直接读取
              import subprocess
              result = subprocess.run(['cat'], input='$MAIN_JSON', text=True, capture_output=True)
              raw_data = result.stdout
              
              if not raw_data:
                  print("错误：没有接收到数据", file=sys.stderr)
                  sys.exit(1)
              
              # Base64解码
              decoded_data = base64.b64decode(raw_data).decode('utf-8')
              
              # 解析JSON并提取URLs
              json_data = json.loads(decoded_data)
              urls = [item['url'] for item in json_data.get('live', [])]
              
              # 保存URLs到文件
              with open('source_urls.txt', 'w') as f:
                  for url in urls:
                      if url.strip():
                          f.write(url.strip() + '\n')
              
              print(f"成功提取了 {len(urls)} 个直播源地址")
              
          except Exception as e:
              print(f"解码失败: {e}", file=sys.stderr)
              sys.exit(1)
          EOF
          
      - name: 显示提取的URL列表
        run: |
          echo "提取到的直播源地址："
          cat source_urls.txt
          
      - name: 防并发下载所有直播源
        run: |
          mkdir -p download_temp
          > live.txt  # 清空最终文件
          
          # 使用信号量控制并发数（最多3个并发）
          MAX_CONCURRENT=3
          
          # 创建临时目录存放PID文件
          mkdir -p /tmp/download_pids
          
          download_url() {
              local url="$1"
              local index="$2"
              local temp_file="/tmp/download_pids/download_${index}.tmp"
              
              echo "[$(date '+%Y-%m-%d %H:%M:%S')] 开始下载: $url"
              
              # 使用wget或curl下载，添加超时和重试
              if curl -s -L --max-time 30 --connect-timeout 10 --retry 2 \
                -H "User-Agent: okHttp/3.12.1" \
                -H "Accept: */*" \
                -H "Connection: keep-alive" \
                "$url" > "$temp_file" 2>/dev/null; then
                  
                  # 检查下载的文件是否为空
                  if [ -s "$temp_file" ]; then
                      echo "[$(date '+%Y-%m-%d %H:%M:%S')] ✓ 成功下载: $url (大小: $(wc -c < "$temp_file") 字节)"
                      # 添加源标识注释
                      echo "# Source: $url" >> "download_temp/part_${index}.txt"
                      cat "$temp_file" >> "download_temp/part_${index}.txt"
                      echo "" >> "download_temp/part_${index}.txt"
                      return 0
                  else
                      echo "[$(date '+%Y-%m-%d %H:%M:%S')] ✗ 下载失败（空文件）: $url"
                      return 1
                  fi
              else
                  echo "[$(date '+%Y-%m-%d %H:%M:%S')] ✗ 下载失败（连接错误）: $url"
                  return 1
              fi
          }
          
          export -f download_url
          
          # 读取URL列表并批量下载
          total_urls=$(wc -l < source_urls.txt)
          current_index=0
          active_jobs=0
          
          while IFS= read -r url || [ -n "$url" ]; do
              if [ -z "$url" ]; then
                  continue
              fi
              
              current_index=$((current_index + 1))
              
              # 启动下载任务
              download_url "$url" "$current_index" &
              pid=$!
              echo $pid > "/tmp/download_pids/pid_${current_index}"
              
              active_jobs=$((active_jobs + 1))
              
              # 如果达到最大并发数，等待任意一个完成
              if [ $active_jobs -ge $MAX_CONCURRENT ]; then
                  wait -n 2>/dev/null || true
                  active_jobs=$((active_jobs - 1))
              fi
              
              # 小延迟避免请求过于密集
              sleep 0.5
          done < source_urls.txt
          
          # 等待所有后台任务完成
          echo "等待所有下载任务完成..."
          wait
          
          echo "所有下载任务已完成"
          
      - name: 合并所有下载内容
        run: |
          # 合并所有部分文件
          > live.txt
          
          if ls download_temp/part_*.txt 1> /dev/null 2>&1; then
              # 按索引顺序合并文件
              for file in $(ls download_temp/part_*.txt | sort -V); do
                  cat "$file" >> live.txt
                  echo "" >> live.txt
              done
              
              # 去重（保留原始顺序）
              python3 << 'EOF'
              import sys
              
              seen = set()
              unique_lines = []
              
              with open('live.txt', 'r', encoding='utf-8', errors='ignore') as f:
                  for line in f:
                      line_stripped = line.rstrip('\n')
                      # 跳过注释行和空行不去重
                      if line_stripped.startswith('#') or not line_stripped.strip():
                          unique_lines.append(line_stripped)
                      else:
                          if line_stripped not in seen:
                              seen.add(line_stripped)
                              unique_lines.append(line_stripped)
              
              with open('live.txt', 'w', encoding='utf-8') as f:
                  f.write('\n'.join(unique_lines))
              
              print(f"去重后保留 {len(unique_lines)} 行内容")
              EOF
              
              echo "合并完成！最终文件大小：$(wc -c < live.txt) 字节"
              echo "直播源条目数：$(grep -c '^http' live.txt || echo 0)"
              
              # 显示前10行作为预览
              echo ""
              echo "文件预览（前10行）："
              head -10 live.txt
          else
              echo "错误：没有成功下载任何内容"
              exit 1
          fi
          
      - name: 清理临时文件
        run: |
          rm -rf download_temp
          rm -rf /tmp/download_pids
          rm -f source_urls.txt main_data.b64
          
      - name: 上传结果文件
        uses: actions/upload-artifact@v4
        with:
          name: live-txt
          path: live.txt
          retention-days: 7
          
      - name: 提交并推送到仓库
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          # 检查是否有内容可提交
          if [ -s live.txt ]; then
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add live.txt
              git diff --staged --quiet || git commit -m "自动更新直播源 $(date '+%Y-%m-%d %H:%M:%S')"
              git push
              echo "已提交到仓库"
          else
              echo "live.txt为空，跳过提交"
          fi
