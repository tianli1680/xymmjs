# .github/workflows/update-tv-playlist-cached.yml
name: 更新电视直播源（带缓存）

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:

env:
  SOURCE_URL: "https://js.iptvlive.icu/abc123"
  OUTPUT_FILE: "tv.txt"

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1
      
      - name: 尝试下载（失败时保留旧文件）
        run: |
          echo "开始下载: $(date)"
          
          # 备份当前文件
          if [ -f "$OUTPUT_FILE" ]; then
            cp "$OUTPUT_FILE" "${OUTPUT_FILE}.backup"
          fi
          
          # 尝试下载，设置更长的超时
          HTTP_CODE=$(curl -A "VLC/3.0.20" \
               -w "%{http_code}" \
               --connect-timeout 15 \
               --max-time 30 \
               -o "$OUTPUT_FILE.tmp" \
               --silent \
               "$SOURCE_URL")
          
          if [ "$HTTP_CODE" = "200" ] && [ -s "$OUTPUT_FILE.tmp" ]; then
            mv "$OUTPUT_FILE.tmp" "$OUTPUT_FILE"
            echo "✓ 下载成功 (HTTP $HTTP_CODE)"
            echo "文件大小: $(wc -c < $OUTPUT_FILE) 字节"
          else
            echo "✗ 下载失败 (HTTP $HTTP_CODE)"
            if [ -f "${OUTPUT_FILE}.backup" ]; then
              echo "使用上次成功的内容"
              cp "${OUTPUT_FILE}.backup" "$OUTPUT_FILE"
            else
              echo "错误: 无可用缓存"
              exit 1
            fi
          fi
          
          # 清理临时文件
          rm -f "${OUTPUT_FILE}.tmp" "${OUTPUT_FILE}.backup"
      
      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add "$OUTPUT_FILE" --force
          git diff --cached --quiet || git commit -m "更新直播源 - $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          git push origin HEAD:${GITHUB_REF_NAME} --force-with-lease || true
